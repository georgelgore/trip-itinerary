<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2c3e50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trip" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>TRIP_NAME YYYY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f2ee;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e8e5df;
      --header-h: 56px;
    }

    html { font-size: 16px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: calc(76px + env(safe-area-inset-bottom));
    }

    /* ── HEADER ── */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: #2c3e50;
      color: #fff;
      padding-top: env(safe-area-inset-top);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: var(--header-h);
    }

    .app-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .app-dates {
      font-size: 12px;
      opacity: 0.65;
      font-weight: 400;
      margin-top: 1px;
    }

    .header-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-btn:active { background: rgba(255,255,255,0.28); }

    /* ── SEARCH ── */
    #search-bar {
      background: #243342;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #search-bar.hidden { display: none; }

    #search-input {
      flex: 1;
      background: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 16px;
      outline: none;
      color: var(--text);
    }

    #search-input::placeholder { color: #999; }

    #search-close-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #search-history {
      background: #2c3e50;
      padding: 6px 12px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    #search-history.hidden { display: none; }

    .history-chip {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      border-radius: 14px;
      padding: 5px 13px;
      font-size: 13px;
      cursor: pointer;
    }

    .history-chip:active { background: rgba(255,255,255,0.28); }

    /* ── SEARCH RESULTS ── */
    #search-results {
      background: var(--card);
      min-height: 60px;
    }

    #search-results.hidden { display: none; }

    .search-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .search-result {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .search-result:active { background: #f5f5f2; }

    .result-tag {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      margin-bottom: 3px;
    }

    .result-main {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .result-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.4;
    }

    mark {
      background: rgba(255, 210, 0, 0.45);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── MAIN ── */
    #main-content { padding: 8px 0 16px; }

    /* ── DAY CARD ── */
    .day-card {
      margin: 8px 12px;
      border-radius: 14px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
    }

    .day-header {
      padding: 14px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .sf       .day-header { background: #1a6bac; }
    .yosemite .day-header { background: #4a7c59; }
    .marin    .day-header { background: #2a8080; }
    .healdsburg .day-header { background: #7c5339; }

    .day-header:active { filter: brightness(0.92); }

    .day-header-text { color: #fff; flex: 1; min-width: 0; }

    .day-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      opacity: 0.75;
      margin-bottom: 2px;
    }

    .day-date {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.2;
    }

    .day-loc {
      font-size: 13px;
      opacity: 0.88;
      margin-top: 4px;
    }

    .day-stay {
      font-size: 12px;
      opacity: 0.68;
      margin-top: 2px;
    }

    .chevron {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 6px;
      transition: transform 0.15s;
    }

    .day-card.open .chevron { transform: rotate(180deg); }

    /* ── SECTIONS ── */
    .sections { display: none; padding: 6px 10px 10px; }
    .day-card.open .sections { display: block; }

    .section {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 6px 0;
      overflow: hidden;
      background: var(--card);
    }

    .section-header {
      display: flex;
      align-items: center;
      padding: 11px 13px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      gap: 9px;
      background: #fafaf8;
      user-select: none;
    }

    .section-header:active { background: #f0ede8; }

    .section-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }

    .section-label-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .section-badges { display: flex; gap: 4px; }

    .badge {
      font-size: 13px;
      line-height: 1;
      padding: 2px 1px;
    }

    .section-chev {
      font-size: 11px;
      color: #bbb;
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .section.open .section-chev { transform: rotate(180deg); }

    /* ── SECTION BODY ── */
    .section-body {
      display: none;
      padding: 12px 14px 14px;
      border-top: 1px solid var(--border);
    }

    .section.open .section-body { display: block; }

    .section-content {
      font-size: 14px;
      line-height: 1.65;
      color: #2a2a2a;
      white-space: pre-line;
    }

    .section-address {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-top: 10px;
      padding: 8px 10px;
      background: #f5f3ef;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      line-height: 1.4;
    }

    .section-notes { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }

    .note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .note-cash { background: #fef9e7; border: 1px solid #f0d060; color: #7a5800; }
    .note-warn { background: #fff3e0; border: 1px solid #ffcc80; color: #7a4400; }
    .note-res  { background: #e8f4fb; border: 1px solid #90caf9; color: #1a4e80; }
    .note-info { background: #f4f4f2; border: 1px solid #ddd;    color: #555; }

    .note-icon { flex-shrink: 0; }
    .note-text { flex: 1; }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      background: var(--card);
      border-top: 1px solid var(--border);
      z-index: 40;
    }

    #quick-ref-btn {
      width: 100%;
      padding: 14px;
      background: #2c3e50;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
    }

    #quick-ref-btn:active { background: #243342; }

    /* ── QUICK REF SHEET ── */
    #sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 50;
      opacity: 0;
      transition: opacity 0.2s;
      display: none;
    }

    #sheet-backdrop.vis { opacity: 1; }

    #quick-ref-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-radius: 18px 18px 0 0;
      z-index: 51;
      display: none;
      flex-direction: column;
      max-height: 82vh;
      transform: translateY(100%);
      transition: transform 0.25s ease-out;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
    }

    #quick-ref-sheet.vis { transform: translateY(0); display: flex; }

    .sheet-handle {
      width: 38px;
      height: 4px;
      background: #ccc;
      border-radius: 2px;
      margin: 12px auto 2px;
      flex-shrink: 0;
    }

    .sheet-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px 12px;
      flex-shrink: 0;
    }

    .sheet-title { font-size: 17px; font-weight: 700; }

    .sheet-close-btn {
      width: 30px;
      height: 30px;
      border: none;
      background: #eeece8;
      border-radius: 50%;
      font-size: 15px;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sheet-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-shrink: 0;
    }

    .sheet-tabs::-webkit-scrollbar { display: none; }

    .sheet-tab {
      flex-shrink: 0;
      padding: 11px 15px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #888;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }

    .sheet-tab.active {
      color: #2c3e50;
      border-bottom-color: #2c3e50;
      font-weight: 700;
    }

    #sheet-content {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      padding: 4px 16px calc(20px + env(safe-area-inset-bottom));
    }

    .ref-item {
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }

    .ref-item:last-child { border-bottom: none; }

    .ref-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .ref-detail {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 12px;
      margin: 0 12px 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── DEEP DIVE SHEET ── */
    #deep-dive-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-radius: 18px 18px 0 0;
      z-index: 51;
      display: none;
      flex-direction: column;
      max-height: 90vh;
      transform: translateY(100%);
      transition: transform 0.25s ease-out;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
    }

    #deep-dive-sheet.vis { transform: translateY(0); display: flex; }

    .dd-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 6px 16px 10px;
      flex-shrink: 0;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .dd-day-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .dd-title { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .dd-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

    #dd-content {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    .dd-timeline { padding: 12px 16px 14px; border-bottom: 1px solid var(--border); }

    .dd-group-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      padding: 14px 16px 2px;
    }

    .timeline-row {
      display: flex;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #f0ede8;
      align-items: baseline;
    }

    .timeline-row:last-child { border-bottom: none; }

    .timeline-time {
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
      width: 104px;
      font-variant-numeric: tabular-nums;
    }

    .timeline-info { flex: 1; }
    .timeline-activity { font-size: 14px; font-weight: 600; color: var(--text); }
    .timeline-note { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .dd-section { border-top: 1px solid var(--border); }

    .dd-section-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      gap: 10px;
      user-select: none;
    }

    .dd-section-header:active { background: #f5f3ef; }
    .dd-section-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }

    .dd-section-label-wrap { flex: 1; }
    .dd-section-label { font-size: 15px; font-weight: 600; color: var(--text); }
    .dd-section-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .dd-chev { font-size: 11px; color: #bbb; flex-shrink: 0; transition: transform 0.15s; }
    .dd-section.open .dd-chev { transform: rotate(180deg); }

    .dd-section-body { display: none; padding: 2px 16px 14px; }
    .dd-section.open .dd-section-body { display: block; }

    .dd-content-text {
      font-size: 14px;
      line-height: 1.65;
      color: #2a2a2a;
      white-space: pre-line;
    }

    .dd-address {
      display: flex;
      gap: 6px;
      margin: 8px 0;
      padding: 8px 10px;
      background: #f5f3ef;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
    }

    .dd-tips { margin-top: 10px; display: flex; flex-direction: column; gap: 3px; }

    .dd-tip {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: #444;
      line-height: 1.5;
      padding: 3px 0;
    }

    .dd-tip-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #bbb;
      flex-shrink: 0;
      margin-top: 7px;
    }

    /* Checklist */
    .dd-checklist { padding: 6px 16px 8px; }

    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid #f0ede8;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .checklist-item:last-child { border-bottom: none; }

    .checklist-cb {
      width: 20px; height: 20px;
      border: 2px solid #ccc;
      border-radius: 5px;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: background 0.1s, border-color 0.1s;
    }

    .checklist-item.checked .checklist-cb { background: #4a7c59; border-color: #4a7c59; color: #fff; }
    .checklist-text { font-size: 14px; color: var(--text); line-height: 1.5; flex: 1; }
    .checklist-item.checked .checklist-text { color: #aaa; text-decoration: line-through; }

    /* Deep dive button on day card */
    .deep-dive-btn-wrap { padding: 4px 4px 8px; }

    .deep-dive-btn {
      width: 100%;
      padding: 11px 14px;
      background: #f0ede8;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .deep-dive-btn:active { background: #e5e1da; }
    .deep-dive-btn-arrow { margin-left: auto; color: #aaa; }

    /* ── RESPONSIVE ── */
    @media (min-width: 600px) {
      #main-content, .legend { max-width: 600px; margin-left: auto; margin-right: auto; }
      .day-card { margin: 10px auto; max-width: 576px; }
      #bottom-bar { max-width: 600px; left: 50%; transform: translateX(-50%); border-radius: 12px 12px 0 0; }
      #quick-ref-sheet { max-width: 600px; left: 50%; transform: translateX(-50%) translateY(100%); border-radius: 18px 18px 0 0; }
      #quick-ref-sheet.vis { transform: translateX(-50%) translateY(0); }
      #deep-dive-sheet { max-width: 600px; left: 50%; transform: translateX(-50%) translateY(100%); border-radius: 18px 18px 0 0; }
      #deep-dive-sheet.vis { transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header id="app-header">
  <div class="header-row">
    <div>
      <div class="app-title">✈️ TRIP_NAME YYYY</div>
      <div class="app-dates">DATES · TRAVELERS</div>
    </div>
    <button class="header-btn" id="search-toggle" aria-label="Search">🔍</button>
  </div>
  <div id="search-bar" class="hidden">
    <input type="search" id="search-input" placeholder="Search places, times, addresses…" autocomplete="off" />
    <button id="search-close-btn">✕</button>
  </div>
  <div id="search-history" class="hidden"></div>
</header>

<!-- ── SEARCH RESULTS ── -->
<div id="search-results" class="hidden"></div>

<!-- ── LEGEND ── -->
<div class="legend" id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#1a6bac"></div> San Francisco</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4a7c59"></div> Yosemite</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2a8080"></div> Mill Valley</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7c5339"></div> Healdsburg</div>
</div>

<!-- ── MAIN ── -->
<main id="main-content"></main>

<!-- ── BOTTOM BAR ── -->
<div id="bottom-bar">
  <button id="quick-ref-btn">Quick Ref · Cash · Hours · Reservations ↑</button>
</div>

<!-- ── QUICK REF SHEET ── -->
<div id="sheet-backdrop"></div>
<div id="quick-ref-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title-row">
    <span class="sheet-title">Quick Reference</span>
    <button class="sheet-close-btn" id="sheet-close-btn">✕</button>
  </div>
  <div class="sheet-tabs">
    <button class="sheet-tab active" data-tab="cashOnly">💵 Cash Only</button>
    <button class="sheet-tab" data-tab="hours">⏰ Hours</button>
    <button class="sheet-tab" data-tab="reservations">📋 Reservations</button>
    <button class="sheet-tab" data-tab="transit">🚗 Transit</button>
  </div>
  <div id="sheet-content"></div>
</div>

<!-- ── DEEP DIVE SHEET ── -->
<div id="deep-dive-sheet">
  <div class="sheet-handle"></div>
  <div class="dd-header">
    <div>
      <div class="dd-day-badge" id="dd-day-badge"></div>
      <div class="dd-title" id="dd-title"></div>
      <div class="dd-subtitle" id="dd-subtitle"></div>
    </div>
    <button class="sheet-close-btn" id="deep-dive-close-btn">✕</button>
  </div>
  <div id="dd-content"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const DAYS = [
  // TODO: Add day objects here. Each day follows this schema:
  {
    id: 1,
    date: 'Day of Week, Month DD',       // e.g. 'Friday, May 29'
    location: 'City / Region',
    sublocation: 'Neighborhood',          // optional
    theme: 'custom',                      // CSS class — add a matching .custom .day-header rule in <style>
    stay: 'Hotel Name · Address',
    sections: [
      {
        label: 'Morning',
        icon: '☕',
        content: 'Description of the activity.',
        address: 'Venue Name, Address',   // optional
        notes: [
          // { type: 'info',        text: 'Informational note' }
          // { type: 'warning',     text: 'Time-sensitive or caution note' }
          // { type: 'cash',        text: 'Cash-only note' }
          // { type: 'reservation', text: 'Reservation reminder' }
        ]
      }
    ]
    // deepDive: {                        // optional — triggers a "Deep Dive" button on the card
    //   title: 'Deep Dive Title',
    //   subtitle: 'Subtitle',
    //   timeline: [ { time: '9:00 AM', activity: 'Activity', note: 'optional note' } ],
    //   stops: [],
    //   logistics: [],
    //   checklists: []
    // }
  }
];

const QUICK_REF = {
  // TODO: Populate each category or leave arrays empty to hide entries
  cashOnly:     [ /* { name: 'Venue', detail: 'Details' } */ ],
  hours:        [ /* { name: 'Venue', detail: 'Hours note' } */ ],
  reservations: [ /* { name: 'Venue', detail: 'Reservation note' } */ ],
  transit:      [ /* { name: 'Route', detail: 'Details' } */ ]
};


// ─── STATE ───────────────────────────────────────────────────────────────────

const state = { searchOpen: false, sheetOpen: false, currentTab: 'cashOnly', ddOpen: false };

// ─── INIT ─────────────────────────────────────────────────────────────────────

function init() {
  renderDays();
  setupSearch();
  setupSheet();
  document.getElementById('deep-dive-close-btn').addEventListener('click', closeDeepDive);
  setupServiceWorker();
}

// ─── RENDER DAYS ──────────────────────────────────────────────────────────────

function renderDays() {
  document.getElementById('main-content').innerHTML =
    DAYS.map(day => `
      <div class="day-card ${day.theme}" data-day="${day.id}">
        <div class="day-header" onclick="toggleDay(${day.id})">
          <div class="day-header-text">
            <div class="day-label">Day ${day.id}</div>
            <div class="day-date">${esc(day.date)}</div>
            <div class="day-loc">${esc(day.location)}${day.sublocation ? ` · ${esc(day.sublocation)}` : ''}</div>
            <div class="day-stay">🏨 ${esc(day.stay)}</div>
          </div>
          <div class="chevron">▼</div>
        </div>
        <div class="sections">
          ${day.sections.map(s => renderSection(day.id, s)).join('')}
          ${day.deepDive ? `
          <div class="deep-dive-btn-wrap">
            <button class="deep-dive-btn" onclick="openDeepDive(${day.id})">
              <span>📖</span><span>${esc(day.deepDive.title)}</span><span class="deep-dive-btn-arrow">→</span>
            </button>
          </div>` : ''}
        </div>
      </div>
    `).join('');
}

function renderSection(dayId, section) {
  const alertBadges = (section.notes || [])
    .filter(n => n.type !== 'info')
    .slice(0, 3)
    .map(n => `<span class="badge">${noteIcon(n.type)}</span>`)
    .join('');

  const notesHtml = (section.notes || []).map(n =>
    `<div class="note ${noteClass(n.type, section.label)}"><span class="note-icon">${noteIcon(n.type)}</span><span class="note-text">${esc(n.text)}</span></div>`
  ).join('');

  return `
    <div class="section" data-day="${dayId}" data-label="${esc(section.label)}">
      <div class="section-header" onclick="toggleSection(this.parentElement)">
        <span class="section-icon">${section.icon}</span>
        <span class="section-label-text">${esc(section.label)}</span>
        ${alertBadges ? `<div class="section-badges">${alertBadges}</div>` : ''}
        <span class="section-chev">▼</span>
      </div>
      <div class="section-body">
        <div class="section-content">${esc(section.content)}</div>
        ${section.address ? `<div class="section-address"><span>📍</span><span>${esc(section.address)}</span></div>` : ''}
        ${section.url ? `<div class="section-address"><span>🔗</span><a href="${esc(section.url)}" target="_blank" rel="noopener">${esc(section.url)}</a></div>` : ''}
        ${notesHtml ? `<div class="section-notes">${notesHtml}</div>` : ''}
      </div>
    </div>
  `;
}

function toggleDay(dayId) {
  document.querySelector(`.day-card[data-day="${dayId}"]`).classList.toggle('open');
}

function toggleSection(el) {
  el.classList.toggle('open');
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────

function setupSearch() {
  const toggleBtn = document.getElementById('search-toggle');
  const input     = document.getElementById('search-input');
  const closeBtn  = document.getElementById('search-close-btn');
  const bar       = document.getElementById('search-bar');
  const results   = document.getElementById('search-results');
  const history   = document.getElementById('search-history');
  const main      = document.getElementById('main-content');
  const legend    = document.getElementById('legend');

  toggleBtn.addEventListener('click', () => {
    state.searchOpen = !state.searchOpen;
    bar.classList.toggle('hidden', !state.searchOpen);
    if (state.searchOpen) {
      input.focus();
      showHistory();
    } else {
      closeSearch();
    }
  });

  closeBtn.addEventListener('click', closeSearch);

  input.addEventListener('input', () => {
    const q = input.value.trim();
    history.classList.add('hidden');
    if (q.length >= 2) {
      const res = doSearch(q);
      renderSearchResults(res, q);
      results.classList.remove('hidden');
      main.classList.add('hidden');
      legend.classList.add('hidden');
    } else if (q.length === 0) {
      results.classList.add('hidden');
      main.classList.remove('hidden');
      legend.classList.remove('hidden');
      showHistory();
    }
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && input.value.trim()) saveHistory(input.value.trim());
    if (e.key === 'Escape') closeSearch();
  });
}

function closeSearch() {
  state.searchOpen = false;
  document.getElementById('search-bar').classList.add('hidden');
  document.getElementById('search-history').classList.add('hidden');
  document.getElementById('search-results').classList.add('hidden');
  document.getElementById('main-content').classList.remove('hidden');
  document.getElementById('legend').classList.remove('hidden');
  document.getElementById('search-input').value = '';
}

function doSearch(query) {
  const q = query.toLowerCase();
  const results = [];

  DAYS.forEach(day => {
    day.sections.forEach(section => {
      const haystack = [
        section.label, section.content, section.address || '',
        day.location, day.sublocation || '', day.stay, day.date,
        ...(section.notes || []).map(n => n.text)
      ].join(' ').toLowerCase();

      if (haystack.includes(q)) {
        results.push({ type: 'section', day, section });
      }
    });
  });

  const catLabels = { cashOnly: 'Cash Only', hours: 'Hours', reservations: 'Reservations', transit: 'Transit' };
  Object.entries(QUICK_REF).forEach(([cat, items]) => {
    items.forEach(item => {
      if (`${item.name} ${item.detail}`.toLowerCase().includes(q)) {
        results.push({ type: 'ref', cat, catLabel: catLabels[cat], item });
      }
    });
  });

  return results;
}

function renderSearchResults(results, query) {
  const container = document.getElementById('search-results');
  if (results.length === 0) {
    container.innerHTML = `<div class="search-empty">No results for "<strong>${esc(query)}</strong>"</div>`;
    return;
  }

  container.innerHTML = results.map(r => {
    if (r.type === 'section') {
      const snippet = r.section.content.replace(/\n/g, ' ').slice(0, 120);
      return `
        <div class="search-result" onclick="jumpTo(${r.day.id}, ${JSON.stringify(r.section.label)})">
          <div class="result-tag">Day ${r.day.id} · ${esc(r.day.date)}</div>
          <div class="result-main">${hilite(r.section.label, query)}</div>
          <div class="result-sub">${hilite(snippet, query)}${r.section.content.length > 120 ? '…' : ''}</div>
          ${r.section.address ? `<div class="result-sub">📍 ${hilite(r.section.address, query)}</div>` : ''}
        </div>
      `;
    } else {
      return `
        <div class="search-result" onclick="openSheet('${r.cat}')">
          <div class="result-tag">Quick Ref · ${esc(r.catLabel)}</div>
          <div class="result-main">${hilite(r.item.name, query)}</div>
          <div class="result-sub">${hilite(r.item.detail, query)}</div>
        </div>
      `;
    }
  }).join('');
}

function jumpTo(dayId, sectionLabel) {
  closeSearch();
  const card = document.querySelector(`.day-card[data-day="${dayId}"]`);
  if (!card) return;
  card.classList.add('open');
  const section = card.querySelector(`.section[data-label="${sectionLabel.replace(/"/g, '\\"')}"]`);
  if (section) section.classList.add('open');
  setTimeout(() => {
    const target = section || card;
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 60);
}

function hilite(text, query) {
  const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.split(new RegExp(`(${safe})`, 'gi'))
    .map(p => p.toLowerCase() === query.toLowerCase() ? `<mark>${esc(p)}</mark>` : esc(p))
    .join('');
}

// ─── SEARCH HISTORY ───────────────────────────────────────────────────────────

function saveHistory(q) {
  let h = getHistory().filter(x => x !== q);
  h.unshift(q);
  localStorage.setItem('TRIP_ID:history', JSON.stringify(h.slice(0, 6)));
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('TRIP_ID:history') || '[]'); } catch { return []; }
}

function showHistory() {
  const div = document.getElementById('search-history');
  const h = getHistory();
  if (!h.length) { div.classList.add('hidden'); return; }
  div.innerHTML = h.map(q =>
    `<button class="history-chip" onclick="applyHistory(${JSON.stringify(q)})">${esc(q)}</button>`
  ).join('');
  div.classList.remove('hidden');
}

function applyHistory(q) {
  const input = document.getElementById('search-input');
  input.value = q;
  input.dispatchEvent(new Event('input'));
}

// ─── QUICK REF SHEET ──────────────────────────────────────────────────────────

function setupSheet() {
  document.getElementById('quick-ref-btn').addEventListener('click', () => openSheet(state.currentTab));
  document.getElementById('sheet-close-btn').addEventListener('click', closeSheet);
  document.getElementById('sheet-backdrop').addEventListener('click', () => {
    if (state.sheetOpen) closeSheet();
    else if (state.ddOpen) closeDeepDive();
  });

  document.querySelectorAll('.sheet-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.currentTab = tab.dataset.tab;
      document.querySelectorAll('.sheet-tab').forEach(t => t.classList.toggle('active', t === tab));
      renderSheetContent(state.currentTab);
    });
  });
}

function openSheet(tab) {
  if (state.ddOpen) closeDeepDive();
  if (tab) {
    state.currentTab = tab;
    document.querySelectorAll('.sheet-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.tab === tab)
    );
  }
  renderSheetContent(state.currentTab);

  const backdrop = document.getElementById('sheet-backdrop');
  const sheet    = document.getElementById('quick-ref-sheet');

  backdrop.style.display = 'block';
  sheet.style.display = 'flex';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    backdrop.classList.add('vis');
    sheet.classList.add('vis');
  }));

  state.sheetOpen = true;
}

function closeSheet() {
  const backdrop = document.getElementById('sheet-backdrop');
  const sheet    = document.getElementById('quick-ref-sheet');
  backdrop.classList.remove('vis');
  sheet.classList.remove('vis');
  setTimeout(() => {
    backdrop.style.display = 'none';
    sheet.style.display = 'none';
  }, 260);
  state.sheetOpen = false;
}

function renderSheetContent(tab) {
  const items = QUICK_REF[tab] || [];
  document.getElementById('sheet-content').innerHTML = items.map(item => `
    <div class="ref-item">
      <div class="ref-name">${esc(item.name)}</div>
      <div class="ref-detail">${esc(item.detail)}</div>
    </div>
  `).join('');
}

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────

function setupServiceWorker() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────

const VALID_NOTE_TYPES = new Set(['cash', 'warning', 'reservation', 'info']);

function noteClass(type, sectionTitle) {
  if (!VALID_NOTE_TYPES.has(type)) console.warn(`Unknown note type "${type}" in section "${sectionTitle}"`);
  return type === 'cash' ? 'note-cash' : type === 'warning' ? 'note-warn' : type === 'reservation' ? 'note-res' : 'note-info';
}

function noteIcon(type) {
  return type === 'cash' ? '💵' : type === 'warning' ? '⚠️' : type === 'reservation' ? '📋' : 'ℹ️';
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ─── DEEP DIVE ────────────────────────────────────────────────────────────────

function openDeepDive(dayId) {
  if (state.sheetOpen) closeSheet();
  const day = DAYS.find(d => d.id === dayId);
  if (!day || !day.deepDive) return;
  const dd = day.deepDive;

  document.getElementById('dd-day-badge').textContent = `Day ${day.id} · ${day.date}`;
  document.getElementById('dd-title').textContent = dd.title;
  document.getElementById('dd-subtitle').textContent = dd.subtitle;

  const content = document.getElementById('dd-content');
  content.innerHTML = [
    renderDDTimeline(dd.timeline),
    dd.stops.length ? `<div class="dd-group-label">Stop-by-Stop</div>` + dd.stops.map(renderDDSection).join('') : '',
    dd.logistics.length ? `<div class="dd-group-label">Logistics</div>` + dd.logistics.map(renderDDSection).join('') : '',
    dd.checklists.length ? `<div class="dd-group-label">Checklists</div>` + dd.checklists.map(renderChecklist).join('') : '',
  ].join('');

  const backdrop = document.getElementById('sheet-backdrop');
  const sheet    = document.getElementById('deep-dive-sheet');
  backdrop.style.display = 'block';
  sheet.style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    backdrop.classList.add('vis');
    sheet.classList.add('vis');
  }));
  state.ddOpen = true;
}

function closeDeepDive() {
  const backdrop = document.getElementById('sheet-backdrop');
  const sheet    = document.getElementById('deep-dive-sheet');
  backdrop.classList.remove('vis');
  sheet.classList.remove('vis');
  setTimeout(() => {
    backdrop.style.display = 'none';
    sheet.style.display = 'none';
  }, 260);
  state.ddOpen = false;
}

function renderDDTimeline(rows) {
  return `
    <div class="dd-timeline">
      <div class="dd-group-label" style="padding:0 0 8px">Timeline</div>
      ${rows.map(r => `
        <div class="timeline-row">
          <div class="timeline-time">${esc(r.time)}</div>
          <div class="timeline-info">
            <div class="timeline-activity">${esc(r.activity)}</div>
            ${r.note ? `<div class="timeline-note">${esc(r.note)}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderDDSection(s) {
  const notesHtml = (s.notes || []).map(n =>
    `<div class="note ${noteClass(n.type, s.label)}" style="margin-top:6px"><span class="note-icon">${noteIcon(n.type)}</span><span class="note-text">${esc(n.text)}</span></div>`
  ).join('');

  const tipsHtml = (s.tips || []).length
    ? `<div class="dd-tips">${s.tips.map(t => `<div class="dd-tip"><div class="dd-tip-dot"></div><span>${esc(t)}</span></div>`).join('')}</div>`
    : '';

  return `
    <div class="dd-section">
      <div class="dd-section-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="dd-section-icon">${s.icon}</span>
        <div class="dd-section-label-wrap">
          <div class="dd-section-label">${esc(s.label)}</div>
          ${s.meta ? `<div class="dd-section-meta">${esc(s.meta)}</div>` : ''}
        </div>
        <span class="dd-chev">▼</span>
      </div>
      <div class="dd-section-body">
        ${s.address ? `<div class="dd-address"><span>📍</span><span>${esc(s.address)}</span></div>` : ''}
        <div class="dd-content-text">${esc(s.content)}</div>
        ${tipsHtml}
        ${notesHtml}
      </div>
    </div>
  `;
}

function renderChecklist(cl) {
  return `
    <div class="dd-checklist">
      <div class="dd-group-label" style="padding:8px 0 6px;font-size:13px">${esc(cl.label)}</div>
      ${cl.items.map((item, i) => {
        const key = `TRIP_ID:check:${cl.id}-${i}`;
        const checked = localStorage.getItem(key) === '1';
        return `
          <div class="checklist-item${checked ? ' checked' : ''}" onclick="toggleCheck('${key}', this)">
            <div class="checklist-cb">${checked ? '✓' : ''}</div>
            <div class="checklist-text">${esc(item)}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function toggleCheck(key, el) {
  const isChecked = el.classList.toggle('checked');
  el.querySelector('.checklist-cb').textContent = isChecked ? '✓' : '';
  localStorage.setItem(key, isChecked ? '1' : '0');
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', init);
</script>
