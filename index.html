<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2c3e50" />
  <title>Trip Itinerary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f2ee;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e8e5df;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: #2c3e50;
      color: #fff;
      padding: 20px 16px 18px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 13px;
      opacity: 0.6;
      margin-top: 3px;
    }

    main {
      padding: 16px 12px 32px;
      max-width: 600px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin: 20px 0 10px 4px;
    }

    .section-label:first-child { margin-top: 8px; }

    .trip-card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
      margin-bottom: 12px;
      text-decoration: none;
      color: inherit;
      display: block;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .trip-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    .card-accent {
      height: 6px;
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .card-name {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .card-dates {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .tag-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-arrow {
      float: right;
      font-size: 18px;
      color: #ccc;
      margin-top: -2px;
    }

    /* Placeholder "add trip" card */
    .add-card {
      background: var(--card);
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .add-card-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .add-card-title {
      font-weight: 600;
      margin-bottom: 4px;
      color: #888;
    }

    .add-card-hint {
      font-size: 12px;
      line-height: 1.5;
    }

    code {
      background: #eeecea;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
      font-family: 'SF Mono', 'Menlo', monospace;
    }

    @media (min-width: 600px) {
      main { padding: 20px 0 40px; }
    }
  </style>
</head>
<body>

<header>
  <h1>✈️ Trip Itinerary</h1>
  <p>All trips · tap to open</p>
</header>

<main>

  <div class="section-label">Upcoming</div>

  <a class="trip-card" href="trips/california-2026/">
    <div class="card-accent" style="background: linear-gradient(90deg, #1a6bac 0%, #4a7c59 40%, #2a8080 70%, #7c5339 100%)"></div>
    <div class="card-body">
      <div class="card-arrow">→</div>
      <div class="card-name">California 2026</div>
      <div class="card-dates">May 29 – June 7 · George &amp; Doug</div>
      <div class="card-tags">
        <span class="tag"><span class="tag-dot" style="background:#1a6bac"></span>San Francisco</span>
        <span class="tag"><span class="tag-dot" style="background:#4a7c59"></span>Yosemite</span>
        <span class="tag"><span class="tag-dot" style="background:#2a8080"></span>Mill Valley</span>
        <span class="tag"><span class="tag-dot" style="background:#7c5339"></span>Healdsburg</span>
      </div>
    </div>
  </a>

  <div class="section-label">Add a trip</div>

  <div class="add-card">
    <div class="add-card-icon">🗺️</div>
    <div class="add-card-title">New trip</div>
    <div class="add-card-hint">
      Copy <code>_template/</code> into <code>trips/destination-year/</code>,<br>
      update the data, then add a card above.
    </div>
  </div>

</main>

</body>
</html>
